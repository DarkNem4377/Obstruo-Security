<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obstruo — Initializing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/intro.css">
</head>
<body>

    <!-- Full screen canvas — all particle magic happens here -->
    <canvas id="intro-canvas"></canvas>

    <!-- Logo image (hidden, used only for pixel sampling) -->
    <img id="logo-source" src="Images/obstruo-logo.png" alt="" crossorigin="anonymous">

    <!-- HUD corners -->
    <div class="corner top-left"></div>
    <div class="corner top-right"></div>
    <div class="corner bottom-left"></div>
    <div class="corner bottom-right"></div>

    <!-- Status line -->
    <div id="status-line"></div>

    <!-- Enter prompt -->
    <div id="enter-text">CLICK OR PRESS ANY KEY TO ENTER</div>

    <!-- Flash overlay -->
    <div id="flash-overlay"></div>

    <!-- GSAP for UI elements only -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="js/intro.js"></script>
</body>
</html>
